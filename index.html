<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Will you be my Valentine?</title>

  <!-- Confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg1: #ffd6e7;
      --bg2: #ffeef6;
      --card: #ffffffcc;
      --yes: #ff3b7a;
      --yesHover: #ff1f68;
    }

    * { box-sizing: border-box; }

    /* SPARKLE CURSOR EFFECT */
    body {
      margin: 0;
      min-height: 100svh;
      max-height: 100svh;
      display: grid;
      place-items: center;
      background: 
        radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 182, 193, 0.4) 0%, transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 105, 180, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(255, 20, 147, 0.2) 0%, transparent 50%),
        linear-gradient(135deg, var(--bg2) 0%, var(--bg1) 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden; /* Prevent scrollbars */
      padding: 16px;
      animation: backgroundShift 8s ease-in-out infinite alternate;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><text y="16" font-size="16">✨</text></svg>'), auto;
      transition: background 0.3s ease;
      position: relative;
    }

    /* ENHANCED SUCCESS STATE */
    .result.show {
      animation: successCelebration 1s ease-out;
    }

    @keyframes successCelebration {
      0% { transform: scale(0.8) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.1) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes backgroundShift {
      0% { background-position: 0% 0%, 100% 100%, 50% 50%; }
      100% { background-position: 100% 100%, 0% 0%, 70% 30%; }
    }

    /* FULL-SCREEN CONFETTI CANVAS */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      width: min(750px, 95vw);
      padding: 40px 35px;
      background: 
        linear-gradient(135deg, 
          rgba(255, 255, 255, 0.25) 0%,
          rgba(255, 240, 245, 0.35) 25%,
          rgba(255, 228, 235, 0.3) 50%,
          rgba(255, 235, 242, 0.35) 75%,
          rgba(255, 245, 250, 0.25) 100%
        );
      backdrop-filter: blur(25px) saturate(1.4);
      border-radius: 32px;
      border: 2px solid transparent;
      background-clip: padding-box;
      text-align: center;
      box-shadow: 
        0 30px 90px rgba(255, 31, 104, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 60px rgba(255, 107, 157, 0.15),
        inset 0 0 120px rgba(255, 182, 203, 0.1);
      position: relative;
      overflow: hidden;
      animation: cardPulse 6s ease-in-out infinite, cardFloat 8s ease-in-out infinite;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes cardPulse {
      0%, 100% {
        box-shadow: 
          0 30px 90px rgba(255, 31, 104, 0.2),
          0 0 0 1px rgba(255, 255, 255, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.3),
          0 0 60px rgba(255, 107, 157, 0.15),
          inset 0 0 120px rgba(255, 182, 203, 0.1);
      }
      50% {
        box-shadow: 
          0 35px 100px rgba(255, 31, 104, 0.3),
          0 0 0 2px rgba(255, 255, 255, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.4),
          0 0 80px rgba(255, 107, 157, 0.25),
          inset 0 0 140px rgba(255, 182, 203, 0.15);
      }
    }
    
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-5px) scale(1.005); }
    }
    
    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 
        0 40px 120px rgba(255, 31, 104, 0.3),
        0 0 0 3px rgba(255, 255, 255, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        0 0 100px rgba(255, 107, 157, 0.3),
        inset 0 0 160px rgba(255, 182, 203, 0.2);
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        conic-gradient(from 0deg, 
          rgba(255, 182, 193, 0.3) 0%,
          rgba(255, 107, 157, 0.4) 25%,
          rgba(255, 31, 104, 0.3) 50%,
          rgba(255, 77, 125, 0.35) 75%,
          rgba(255, 182, 193, 0.3) 100%
        );
      animation: shimmerRotate 8s linear infinite;
      pointer-events: none;
      opacity: 0.6;
    }
    
    /* Add animated border */
    .card::after {
      content: '';
      position: absolute;
      inset: -2px;
      padding: 2px;
      background: 
        conic-gradient(from 0deg, 
          var(--pink-light),
          var(--pink-deep),
          var(--red-soft),
          var(--red-vibrant),
          var(--pink-medium),
          var(--pink-light)
        );
      border-radius: 32px;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: subtract;
      animation: borderRotate 4s linear infinite;
      pointer-events: none;
    }
    
    @keyframes shimmerRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes borderRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* FLOATING PARTICLES AROUND CARD */
    .card-particles {
      position: absolute;
      inset: -100px;
      pointer-events: none;
      z-index: -1;
    }
    
    .magic-particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, var(--pink-deep) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.8;
      animation: floatParticle 8s linear infinite;
    }
    
    .sparkle-particle {
      position: absolute;
      font-size: 14px;
      opacity: 0.7;
      animation: sparkleFloat 6s ease-in-out infinite;
    }
    
    .glow-orb {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(255, 107, 157, 0.4) 0%, transparent 70%);
      border-radius: 50%;
      animation: orbFloat 10s ease-in-out infinite;
      filter: blur(1px);
    }
    
    @keyframes floatParticle {
      0% {
        transform: translateY(100px) translateX(0px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-100px) translateX(50px) rotate(360deg);
        opacity: 0;
      }
    }
    
    @keyframes sparkleFloat {
      0%, 100% {
        transform: translateY(0px) translateX(0px) scale(1) rotate(0deg);
        opacity: 0.7;
      }
      25% {
        transform: translateY(-30px) translateX(15px) scale(1.2) rotate(90deg);
        opacity: 1;
      }
      50% {
        transform: translateY(-10px) translateX(-10px) scale(0.8) rotate(180deg);
        opacity: 0.6;
      }
      75% {
        transform: translateY(-40px) translateX(20px) scale(1.1) rotate(270deg);
        opacity: 0.9;
      }
    }
    
    @keyframes orbFloat {
      0%, 100% {
        transform: translate(0px, 0px) scale(1);
        opacity: 0.4;
      }
      33% {
        transform: translate(30px, -20px) scale(1.3);
        opacity: 0.7;
      }
      66% {
        transform: translate(-20px, 15px) scale(0.8);
        opacity: 0.5;
      }
    }

    .art {
      width: min(260px, 80vw);
      margin: 0 auto 10px;
      display: block;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.12));
    }

    /* PHOTO CONTAINER WITH ROMANTIC STYLING */
    .photo-container {
      position: relative;
      width: min(260px, 80vw);
      height: min(260px, 80vw);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gf-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 6px solid #ff6b9d;
      box-shadow: 
        0 0 0 4px rgba(255, 107, 157, 0.3),
        0 20px 40px rgba(255, 61, 122, 0.2),
        inset 0 0 20px rgba(255, 255, 255, 0.1);
      filter: saturate(1.1) brightness(1.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gf-photo:hover {
      transform: scale(1.05);
      box-shadow: 
        0 0 0 6px rgba(255, 107, 157, 0.4),
        0 25px 50px rgba(255, 61, 122, 0.3),
        inset 0 0 30px rgba(255, 255, 255, 0.2);
    }

    /* PARTICLE EXPLOSION AROUND PHOTO */
    .photo-container::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 61, 122, 0.3), transparent, rgba(255, 105, 180, 0.3), transparent);
      animation: rotate 8s linear infinite;
      opacity: 0.6;
      z-index: -1;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* MORPHING GLOW EFFECT FOR PHOTO */
    .photo-container::before {
      content: '';
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 182, 193, 0.2) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite alternate;
      z-index: -2;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.3; }
      100% { transform: scale(1.2); opacity: 0.1; }
    }

    .floating-hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      font-size: clamp(16px, 3vw, 24px);
      animation: float 3s ease-in-out infinite;
      opacity: 0.8;
    }

    .heart1 {
      top: 10%;
      left: 15%;
      animation-delay: 0s;
    }

    .heart2 {
      top: 20%;
      right: 10%;
      animation-delay: 0.8s;
    }

    .heart3 {
      bottom: 25%;
      left: 8%;
      animation-delay: 1.6s;
    }

    .heart4 {
      bottom: 15%;
      right: 15%;
      animation-delay: 2.4s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.6;
      }
      50% {
        transform: translateY(-15px) scale(1.2);
        opacity: 1;
      }
    }

    /* FLOATING BACKGROUND HEARTS */
    .floating-bg-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .bg-heart {
      position: absolute;
      font-size: clamp(20px, 4vw, 40px);
      opacity: 0.1;
      animation: floatAround 15s ease-in-out infinite;
    }

    .bg-heart:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
    .bg-heart:nth-child(2) { top: 20%; right: 20%; animation-delay: 2s; }
    .bg-heart:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 4s; }
    .bg-heart:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 6s; }
    .bg-heart:nth-child(5) { top: 50%; left: 5%; animation-delay: 8s; }
    .bg-heart:nth-child(6) { top: 40%; right: 5%; animation-delay: 10s; }

    @keyframes floatAround {
      0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.1; }
      25% { transform: translate(20px, -20px) rotate(90deg); opacity: 0.2; }
      50% { transform: translate(-10px, -40px) rotate(180deg); opacity: 0.15; }
      75% { transform: translate(-20px, -10px) rotate(270deg); opacity: 0.2; }
    }

    /* MAGNETIC INTERACTIVE HEARTS */
    .magnetic-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .magnetic-heart {
      position: absolute;
      font-size: clamp(25px, 5vw, 45px);
      opacity: 0.6;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: drop-shadow(0 0 10px rgba(255, 61, 122, 0.5));
    }

    .magnetic-heart:nth-child(1) { top: 15%; left: 20%; }
    .magnetic-heart:nth-child(2) { top: 60%; right: 15%; }
    .magnetic-heart:nth-child(3) { bottom: 20%; left: 10%; }
    .magnetic-heart:nth-child(4) { top: 40%; left: 5%; }
    .magnetic-heart:nth-child(5) { bottom: 35%; right: 8%; }

    /* FLOATING BUBBLES */
    .bubble-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(255, 182, 193, 0.3));
      border: 2px solid rgba(255, 105, 180, 0.2);
      animation: bubbleFloat 8s ease-in-out infinite;
    }

    .bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-delay: 0s; }
    .bubble:nth-child(2) { width: 60px; height: 60px; right: 15%; animation-delay: 1s; }
    .bubble:nth-child(3) { width: 30px; height: 30px; left: 30%; animation-delay: 2s; }
    .bubble:nth-child(4) { width: 50px; height: 50px; right: 25%; animation-delay: 3s; }
    .bubble:nth-child(5) { width: 35px; height: 35px; left: 60%; animation-delay: 4s; }
    .bubble:nth-child(6) { width: 45px; height: 45px; right: 40%; animation-delay: 5s; }

    @keyframes bubbleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
      50% { transform: translateY(-50px) scale(1.2); opacity: 0.8; }
    }

    /* LIGHTNING EFFECTS */
    .lightning-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .lightning {
      position: absolute;
      width: 2px;
      height: 100px;
      background: linear-gradient(0deg, transparent, #ff1f68, #ff3b7a, transparent);
      opacity: 0;
      animation: lightning 4s ease-in-out infinite;
      box-shadow: 0 0 10px #ff1f68;
    }

    .lightning:nth-child(1) {
      left: 20%;
      transform: rotate(15deg);
      animation-delay: 0s;
    }

    .lightning:nth-child(2) {
      right: 30%;
      transform: rotate(-20deg);
      animation-delay: 2s;
    }

    @keyframes lightning {
      0%, 90%, 100% { opacity: 0; }
      5%, 10% { opacity: 1; }
    }

    /* FALLING PETALS */
    .falling-petals {
      position: fixed;
      top: -50px;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 2;
    }

    .petal {
      position: absolute;
      font-size: clamp(16px, 3vw, 24px);
      animation: fall linear infinite;
      opacity: 0.7;
    }

    .petal:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
    .petal:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
    .petal:nth-child(3) { left: 30%; animation-duration: 7s; animation-delay: 2s; }
    .petal:nth-child(4) { left: 40%; animation-duration: 9s; animation-delay: 3s; }
    .petal:nth-child(5) { left: 50%; animation-duration: 11s; animation-delay: 4s; }
    .petal:nth-child(6) { left: 60%; animation-duration: 8s; animation-delay: 5s; }
    .petal:nth-child(7) { left: 70%; animation-duration: 10s; animation-delay: 6s; }
    .petal:nth-child(8) { left: 80%; animation-duration: 9s; animation-delay: 7s; }

    @keyframes fall {
      from {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* YES CELEBRATION EMOJI RAIN */
    .emoji-rain-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
    }

    .emoji-drop {
      position: absolute;
      top: -10%;
      font-size: clamp(24px, 6vw, 34px);
      animation: emojiFall var(--duration, 3s) linear forwards;
      filter: drop-shadow(0 6px 10px rgba(255, 61, 122, 0.35));
    }

    @keyframes emojiFall {
      0% { transform: translateY(-110%); opacity: 1; }
      100% { transform: translateY(110%); opacity: 0; }
    }

    h1 {
      font-size: clamp(28px, 4.5vw, 48px);
      margin: 20px 0 24px;
      background: linear-gradient(45deg, #ff3b7a, #ff1f68, #e91e63);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(255, 61, 122, 0.2);
      letter-spacing: 0.5px;
    }

    /* ADD ROMANTIC SUBTITLE */
    .subtitle {
      font-size: clamp(14px, 2.5vw, 18px);
      color: #ff1f68;
      margin-bottom: 20px;
      font-style: italic;
      opacity: 0.8;
    }

    /* PULSING HEART */
    .pulsing-heart {
      font-size: clamp(30px, 6vw, 50px);
      animation: heartPulse 1.5s ease-in-out infinite;
      margin: 10px 0;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .button-zone {
      position: relative;
      width: min(520px, 92%);
      height: clamp(180px, 42vh, 280px);
      margin: 0 auto;
      touch-action: none;
      perspective: 1000px;
      overflow: visible;
      z-index: 1;
    }

    /* Ensure container doesn't block escaping */
    .card {
      width: min(720px, 92vw);
      padding: 32px 28px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 2px solid rgba(255, 182, 193, 0.3);
      text-align: center;
      box-shadow: 
        0 25px 80px rgba(255, 61, 122, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: relative;
      overflow: visible; /* Allow button to escape */
      z-index: 2;
    }

    /* MORPHING BACKGROUND FOR BUTTON ZONE */
    .button-zone::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 30px;
      background: linear-gradient(45deg, 
        rgba(255, 182, 193, 0.1) 0%, 
        rgba(255, 105, 180, 0.1) 25%,
        rgba(255, 20, 147, 0.1) 50%,
        rgba(255, 105, 180, 0.1) 75%,
        rgba(255, 182, 193, 0.1) 100%);
      animation: morphBackground 6s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes morphBackground {
      0%, 100% { border-radius: 30px; transform: rotate(0deg); }
      25% { border-radius: 50px 20px 40px 15px; transform: rotate(2deg); }
      50% { border-radius: 20px 50px 15px 40px; transform: rotate(-2deg); }
      75% { border-radius: 40px 15px 50px 25px; transform: rotate(1deg); }
    }

    button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 20px 36px;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(255, 31, 104, 0.2);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 1px;
      backdrop-filter: blur(20px);
      text-shadow: 0 2px 8px rgba(255, 31, 104, 0.3);
    }

    button:hover:not(#yesBtn) {
      transform: translateY(-52%) scale(1.05);
      box-shadow: 0 15px 35px rgba(0,0,0,.18);
    }

    #yesBtn {
      left: 18%;
      background: linear-gradient(135deg, 
        rgba(255, 31, 104, 0.9) 0%, 
        rgba(255, 77, 125, 0.95) 50%,
        rgba(255, 107, 157, 0.9) 100%
      );
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      position: relative;
      overflow: visible;
      font-size: 24px !important;
      padding: 24px 42px !important;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      letter-spacing: 1.5px;
      animation: yesButtonPulse 2s ease-in-out infinite;
      box-shadow: 
        0 0 30px rgba(255, 31, 104, 0.5),
        0 12px 35px rgba(255, 61, 122, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 60px rgba(255, 107, 157, 0.2);
      filter: drop-shadow(0 8px 20px rgba(255, 31, 104, 0.4));
    }
    
    #yesBtn::before {
      content: '💖';
      position: absolute;
      top: -15px;
      left: -15px;
      font-size: 20px;
      animation: heartFloat 1.5s ease-in-out infinite;
    }
    
    #yesBtn::after {
      content: '✨';
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 18px;
      animation: sparkleFloat 2s ease-in-out infinite 0.5s;
    }
    
    /* Keep Yes button identical on hover */
    #yesBtn:hover { 
      background: linear-gradient(135deg, #ff3b7a 0%, #ff1f68 100%);
      box-shadow: 
        0 0 20px rgba(255, 31, 104, 0.4),
        0 8px 25px rgba(255, 61, 122, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      animation: yesButtonPulse 2s ease-in-out infinite;
      transform: translateY(-50%) scale(1) !important;
    }
    
    @keyframes yesButtonPulse {
      0%, 100% { 
        box-shadow: 
          0 0 20px rgba(255, 31, 104, 0.4),
          0 8px 25px rgba(255, 61, 122, 0.3);
      }
      50% { 
        box-shadow:

      content: '';
      position: absolute;

      height: 80vmax;

      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0.35;
      animation: auroraMove 18s ease-in-out infinite alternate;

      left: -10%;
      top: -20%;

      bottom: -10%;

    <div class="hint" id="hint">"No" seems a bit shy 😈</div>

    <section class="result" id="result">
      <h2>YAY! 🎉</h2>
      <p class="celebration-text">I'm the luckiest person in the world! 💕</p>
      <img
        class="fireworks"
        src="celebration.webp"
        alt="Celebration"
      />
    </section>
  </main>

  <script>
    const zone = document.getElementById("zone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const hint = document.getElementById("hint");

    /* ---------- MAGNETIC HEARTS FOLLOW MOUSE ---------- */
    const magneticHearts = document.querySelectorAll('.magnetic-heart');
    let mouseX = 0, mouseY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      // Update CSS custom properties for dynamic background
      document.documentElement.style.setProperty('--mouse-x', (e.clientX / window.innerWidth * 100) + '%');
      document.documentElement.style.setProperty('--mouse-y', (e.clientY / window.innerHeight * 100) + '%');
      
      // Magnetic attraction for hearts
      magneticHearts.forEach((heart, index) => {
        const rect = heart.getBoundingClientRect();
        const heartX = rect.left + rect.width / 2;
        const heartY = rect.top + rect.height / 2;
        
        const distance = Math.hypot(mouseX - heartX, mouseY - heartY);
        const maxDistance = 200;
        
        if (distance < maxDistance) {
          const force = (maxDistance - distance) / maxDistance;
          const moveX = (mouseX - heartX) * force * 0.3;
          const moveY = (mouseY - heartY) * force * 0.3;
          
          heart.style.transform = `translate(${moveX}px, ${moveY}px) scale(${1 + force * 0.5})`;
          heart.style.opacity = 0.6 + force * 0.4;
        } else {
          heart.style.transform = 'translate(0, 0) scale(1)';
          heart.style.opacity = 0.6;
        }
      });
    });

    /* ---------- RAINBOW TRAIL EFFECT ---------- */
    let trailTimer = 0;
    document.addEventListener('mousemove', (e) => {
      trailTimer++;
      if (trailTimer % 3 === 0) { // Every 3rd mouse move
        const trail = document.createElement('div');
        const colors = ['#ff1f68', '#ff3b7a', '#ff69b4', '#ff1493', '#dc143c'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        trail.style.cssText = `
          position: fixed;
          left: ${e.clientX - 5}px;
          top: ${e.clientY - 5}px;
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: ${randomColor};
          pointer-events: none;
          z-index: 9997;
          animation: trailFade 1s ease-out forwards;
          box-shadow: 0 0 10px ${randomColor};
        `;
        
        document.body.appendChild(trail);
        setTimeout(() => trail.remove(), 1000);
      }
    });

    /* ---------- SPARKLE TRAIL EFFECT ---------- */
    document.addEventListener('mousemove', (e) => {
      if (Math.random() < 0.08) { // Reduced frequency for better performance
        const sparkle = document.createElement('div');
        const sparkleTypes = ['✨', '🌟', '⭐', '💖'];
        sparkle.innerHTML = sparkleTypes[Math.floor(Math.random() * sparkleTypes.length)];
        sparkle.style.position = 'fixed';
        sparkle.style.left = e.clientX + Math.random() * 40 - 20 + 'px';
        sparkle.style.top = e.clientY + Math.random() * 40 - 20 + 'px';
        sparkle.style.pointerEvents = 'none';
        sparkle.style.animation = 'sparkle 1.5s ease-out forwards';
        sparkle.style.zIndex = '9998';
        sparkle.style.fontSize = Math.random() * 10 + 15 + 'px';
        document.body.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 1500);
      }
    });

    // Enhanced sparkle animation CSS
    const style = document.createElement('style');
    style.textContent = `
      @keyframes sparkle {
        0% { opacity: 1; transform: scale(0) rotate(0deg); }
        50% { opacity: 1; transform: scale(1) rotate(180deg); }
        100% { opacity: 0; transform: scale(0) rotate(360deg) translateY(-80px); }
      }
      @keyframes trailFade {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0); }
      }
    `;
    document.head.appendChild(style);

    /* ---------- CONFETTI ---------- */
    const confettiCanvas = document.getElementById("confettiCanvas");

    function resizeConfettiCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = Math.floor(window.innerWidth * dpr);
      confettiCanvas.height = Math.floor(window.innerHeight * dpr);
      confettiCanvas.style.width = "100vw";
      confettiCanvas.style.height = "100vh";
    }

    resizeConfettiCanvas();
    window.addEventListener("resize", resizeConfettiCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeConfettiCanvas, 150));

    const confettiInstance = confetti.create(confettiCanvas, {
      resize: false,
      useWorker: true
    });

    function fullScreenConfetti() {
      const end = Date.now() + 1600;

      (function frame() {
        confettiInstance({
          particleCount: 12,
          spread: 90,
          startVelocity: 45,
          ticks: 180,
          origin: { x: Math.random(), y: Math.random() * 0.3 }
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();

      setTimeout(() => {
        confettiInstance({
          particleCount: 300,
          spread: 140,
          startVelocity: 60,
          ticks: 220,
          origin: { x: 0.5, y: 0.55 }
        });
      }, 300);
    }

    /* ---------- YES BUTTON GROWS ---------- */
    let yesScale = 1;
    function growYes() {
      // Keep Yes button size and shape constant
      yesBtn.style.transform = 'translateY(-50%) scale(1)';
      yesBtn.style.boxShadow = '';
    }

    /* ---------- NO BUTTON RUNS AWAY ---------- */
    let noEscapeCount = 0;
    let noClickCount = 0;
    const noTexts = [
      "No",
      "Are you sure? 🥺", 
      "Really? 💔",
      "Please reconsider 🥹",
      "You're breaking my heart! 💔😢"
    ];
    
    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function updateNoButtonText() {
      // Update text based on click count only
      const textIndex = Math.min(noClickCount, noTexts.length - 1);
      noBtn.textContent = noTexts[textIndex];
    }

    function updateNoButton() {
      // Remove previous shrink classes
      noBtn.classList.remove('shrink-1', 'shrink-2', 'shrink-3', 'shrink-4');
      
      // Apply progressive shrinking based on escape count
      if (noEscapeCount > 0) {
        const shrinkLevel = Math.min(noEscapeCount, 4);
        noBtn.classList.add(`shrink-${shrinkLevel}`);
      }
      
      // Add defeated animation if escaped too many times
      if (noEscapeCount >= 3) {
        noBtn.style.opacity = '0.8';
        noBtn.style.filter = 'grayscale(20%)';
      }
    }

    function moveNo(px, py) {
      noEscapeCount++;
      updateNoButton();
      const z = zone.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();
      const yb = yesBtn.getBoundingClientRect();

      noBtn.classList.add('panic');
      setTimeout(() => noBtn.classList.remove('panic'), 200);

      let dx = (b.left + b.width / 2) - px;
      let dy = (b.top + b.height / 2) - py;
      let mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      // Adjust movement distance for mobile vs desktop
      const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
      const moveDist = isMobile ? 190 : 160;

      // Add slight perpendicular arc for organic motion
      const arc = 0.35;
      const perpX = -dy * arc;
      const perpY = dx * arc;

      let newLeft = (b.left - z.left) + (dx + perpX) * moveDist;
      let newTop  = (b.top - z.top) + (dy + perpY) * moveDist;

      // ULTRA-ROBUST COLLISION AVOIDANCE SYSTEM
      // Get Yes button boundaries with safety buffer
      const yesCenterX = (yb.left - z.left) + yb.width / 2;
      const yesCenterY = (yb.top - z.top) + yb.height / 2;
      const yesLeft = yb.left - z.left;
      const yesTop = yb.top - z.top;
      const yesRight = yesLeft + yb.width;
      const yesBottom = yesTop + yb.height;
      const SAFE_DISTANCE = 250; // Much larger safe distance
      
      // Function to check if position is safe
      function isPositionSafe(testLeft, testTop) {
        const testCenterX = testLeft + b.width / 2;
        const testCenterY = testTop + b.height / 2;
        const centerDistance = Math.hypot(testCenterX - yesCenterX, testCenterY - yesCenterY);
        
        // Check rectangle overlap with expanded Yes area
        const expandedYes = {
          left: yesLeft - 60,
          top: yesTop - 60, 
          right: yesRight + 60,
          bottom: yesBottom + 60
        };
        
        const testRight = testLeft + b.width;
        const testBottom = testTop + b.height;
        const hasOverlap = !(testRight < expandedYes.left || testLeft > expandedYes.right || 
                            testBottom < expandedYes.top || testTop > expandedYes.bottom);
        
        return centerDistance >= SAFE_DISTANCE && !hasOverlap;
      }
      
      // Step 1: Try to clamp and check if safe
      newLeft = clamp(newLeft, 0, z.width - b.width);
      newTop = clamp(newTop, 0, z.height - b.height);
      
      // Step 2: If not safe, try predefined safe zones
      if (!isPositionSafe(newLeft, newTop)) {
        const safeZones = [
          // Far corners
          { left: 15, top: 15 },
          { left: z.width - b.width - 15, top: 15 },
          { left: 15, top: z.height - b.height - 15 },
          { left: z.width - b.width - 15, top: z.height - b.height - 15 },
          // Mid edges
          { left: z.width / 2 - b.width / 2, top: 15 },
          { left: 15, top: z.height / 2 - b.height / 2 },
          { left: z.width - b.width - 15, top: z.height / 2 - b.height / 2 },
          { left: z.width / 2 - b.width / 2, top: z.height - b.height - 15 }
        ];
        
        // Find the safest zone (farthest from Yes)
        let bestZone = null;
        let maxDistance = 0;
        
        for (const zone of safeZones) {
          if (isPositionSafe(zone.left, zone.top)) {
            const zoneCenterX = zone.left + b.width / 2;
            const zoneCenterY = zone.top + b.height / 2;
            const distance = Math.hypot(zoneCenterX - yesCenterX, zoneCenterY - yesCenterY);
            
            if (distance > maxDistance) {
              maxDistance = distance;
              bestZone = zone;
            }
          }
        }
        
        if (bestZone) {
          newLeft = bestZone.left;
          newTop = bestZone.top;
        } else {
          // Step 3: Force to opposite corner as absolute fallback
          if (yesCenterX < z.width / 2 && yesCenterY < z.height / 2) {
            // Yes in top-left quadrant, force No to bottom-right
            newLeft = z.width - b.width - 15;
            newTop = z.height - b.height - 15;
          } else if (yesCenterX >= z.width / 2 && yesCenterY < z.height / 2) {
            // Yes in top-right quadrant, force No to bottom-left  
            newLeft = 15;
            newTop = z.height - b.height - 15;
          } else if (yesCenterX < z.width / 2 && yesCenterY >= z.height / 2) {
            // Yes in bottom-left quadrant, force No to top-right
            newLeft = z.width - b.width - 15;
            newTop = 15;
          } else {
            // Yes in bottom-right quadrant, force No to top-left
            newLeft = 15;
            newTop = 15;
          }
        }
      }

      const prevX = b.left + b.width / 2;
      const prevY = b.top + b.height / 2;

      noBtn.style.left = newLeft + "px";
      noBtn.style.top = newTop + "px";
      noBtn.classList.add('escaping');
      setTimeout(() => noBtn.classList.remove('escaping'), 200);

      const trail = document.createElement('div');
      trail.className = 'no-trail';
      trail.textContent = '💨';
      trail.style.position = 'fixed';
      trail.style.left = (prevX - 8) + 'px';
      trail.style.top = (prevY - 8) + 'px';
      trail.style.pointerEvents = 'none';
      trail.style.zIndex = '9998';
      trail.style.fontSize = '16px';
      trail.style.animation = 'trailFade 0.8s ease-out forwards';
      document.body.appendChild(trail);
      setTimeout(() => trail.remove(), 800);

      noBtn.classList.add('landed');
      setTimeout(() => noBtn.classList.remove('landed'), 250);
      
      // Add some extra visual feedback for later escapes
      if (noEscapeCount >= 2) {
        noBtn.style.animation = 'noIdleWobble 3s ease-in-out infinite, noPleading 1s ease-in-out';
      }

      growYes();
    }

    function breakButtonApart() {
      // Hide the original button immediately
      noBtn.style.display = 'none';
      
      // Create full-screen overlay
      const overlay = document.createElement('div');
      overlay.className = 'breaking-heart-overlay';
      
      // Create heart container
      const heartContainer = document.createElement('div');
      heartContainer.className = 'heart-container';
      
      // Create heart halves
      const heartLeft = document.createElement('div');
      heartLeft.className = 'heart-half heart-left';
      heartLeft.textContent = '💔';
      
      const heartRight = document.createElement('div');
      heartRight.className = 'heart-half heart-right';
      heartRight.textContent = '💔';
      
      heartContainer.appendChild(heartLeft);
      heartContainer.appendChild(heartRight);
      overlay.appendChild(heartContainer);
      
      // Add tears falling across the entire screen immediately
      const tearTypes = ['💧', '😢', '💙', '🌊', '❄️'];
      const tearSizes = ['small', 'normal', 'large'];
      const numTears = 80; // Create many tears across the screen
      
      for (let i = 0; i < numTears; i++) {
        const tearElement = document.createElement('div');
        tearElement.className = 'heart-tear';
        
        // Add random size class
        const size = tearSizes[Math.floor(Math.random() * tearSizes.length)];
        if (size !== 'normal') {
          tearElement.classList.add(size);
        }
        
        // Random tear type
        tearElement.textContent = tearTypes[Math.floor(Math.random() * tearTypes.length)];
        
        // Position randomly across entire viewport
        const randomX = Math.random() * 100; // 0-100% of viewport width
        const randomY = Math.random() * 20; // Start from top 20% of screen
        tearElement.style.left = randomX + '%';
        tearElement.style.top = randomY + '%';
        
        // Add variety to animation timing and type
        const animationTypes = ['tearFall', 'tearFallSlow', 'tearFallFast'];
        const animationType = animationTypes[Math.floor(Math.random() * animationTypes.length)];
        const duration = 3 + Math.random() * 3; // 3-6 seconds
        const delay = Math.random() * 500; // 0-500ms delay
        
        tearElement.style.animation = `${animationType} ${duration}s ease-in ${delay}ms forwards`;
        
        // Append to document body for full screen coverage
        document.body.appendChild(tearElement);
        
        // Remove tear after animation completes
        setTimeout(() => {
          if (tearElement.parentNode) {
            tearElement.remove();
          }
        }, (duration * 1000) + delay + 1000);
      }
      
      document.body.appendChild(overlay);
      
      // Gentle screen shake effect
      document.body.style.animation = 'screenShake 2s ease-in-out';
      setTimeout(() => {
        document.body.style.animation = '';
      }, 2000);
      
      // Remove overlay after animation completes
      setTimeout(() => {
        overlay.style.transition = 'opacity 2s ease-out';
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 2000);
      }, 4000);
      
      // Update hint text with delay for dramatic effect
      setTimeout(() => {
        hint.textContent = "The heart has been shattered... 💔😢";
        hint.style.color = '#ff1f68';
        hint.style.fontWeight = 'bold';
        hint.style.animation = 'pop 0.5s ease';
      }, 3000);
    }
    
    // Add screen shake animation
    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = `
      @keyframes screenShake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
        20%, 40%, 60%, 80% { transform: translateX(3px); }
      }
    `;
    document.head.appendChild(shakeStyle);

    /* ---------- YES CLICK ---------- */
    yesBtn.addEventListener("click", () => {
      zone.style.display = "none";
      hint.style.display = "none";     // HIDE THE HINT
      result.style.display = "block";
      
      resizeConfettiCanvas();
      fullScreenConfetti();

      // Hearts & celebration emoji rain for ~2 seconds
      startEmojiRain(2000);
      
      // Create burst of sparkles
      setTimeout(() => {
        for(let i = 0; i < 20; i++) {
          setTimeout(() => {
            const sparkle = document.createElement('div');
            sparkle.innerHTML = ['✨', '💖', '🌟', '💕'][Math.floor(Math.random() * 4)];
            sparkle.style.position = 'fixed';
            sparkle.style.left = Math.random() * window.innerWidth + 'px';
            sparkle.style.top = Math.random() * window.innerHeight + 'px';
            sparkle.style.pointerEvents = 'none';
            sparkle.style.animation = 'sparkle 2s ease-out forwards';
            sparkle.style.zIndex = '9998';
            sparkle.style.fontSize = '24px';
            document.body.appendChild(sparkle);
            
            setTimeout(() => sparkle.remove(), 2000);
          }, i * 100);
        }
      }, 500);

      // Heart burst celebration
      celebrationBurst();
    });

    // Emoji rain: hearts and celebration emojis falling across screen
    function startEmojiRain(durationMs = 2000) {
      const layer = document.createElement('div');
      layer.className = 'emoji-rain-layer';
      document.body.appendChild(layer);

      const emojis = ['💖', '💕', '💗', '💝', '🎉', '✨', '🥳'];
      const start = Date.now();

      function spawnBatch() {
        const elapsed = Date.now() - start;
        if (elapsed > durationMs) return;

        const dropsThisBatch = 10;
        for (let i = 0; i < dropsThisBatch; i++) {
          const drop = document.createElement('div');
          drop.className = 'emoji-drop';
          drop.textContent = emojis[Math.floor(Math.random() * emojis.length)];

          const left = Math.random() * 100; // 0-100vw
          const duration = 2.4 + Math.random() * 1.2; // 2.4-3.6s
          const delay = Math.random() * 0.4; // 0-0.4s

          drop.style.left = left + 'vw';
          drop.style.setProperty('--duration', duration + 's');
          drop.style.animationDelay = delay + 's';

          layer.appendChild(drop);

          // Clean up individual drop after it finishes
          setTimeout(() => {
            if (drop.parentNode) drop.remove();
          }, (duration + delay) * 1000 + 200);
        }

        // Keep spawning batches roughly every 200ms while within duration
        setTimeout(spawnBatch, 200);
      }

      spawnBatch();

      // Fade out and remove entire layer after rain finishes
      const totalLife = durationMs + 3200; // allow falls to complete
      setTimeout(() => {
        layer.style.transition = 'opacity 0.6s ease-out';
        layer.style.opacity = '0';
        setTimeout(() => {
          if (layer.parentNode) layer.remove();
        }, 700);
      }, totalLife);
    }

    // Start background music on first user interaction (no autoplay)
    (function setupBgMusicAutoplay(){
      const bg = document.getElementById('bgMusic');
      if (!bg) return;
      const START_AT = 15; // seconds

      function seekToStart() {
        try {
          if (bg.readyState > 0) {
            bg.currentTime = START_AT;
          } else {
            bg.addEventListener('loadedmetadata', () => { bg.currentTime = START_AT; }, { once: true });
          }
        } catch(_) {}
      }

      let started = false;

      function start() {
        if (started) return;
        started = true;
        seekToStart();
        bg.muted = false;
        bg.volume = 0.6;
        bg.play().catch(() => {});
        removeAll();
      }

      function addAll() {
        document.addEventListener('click', start, { capture: true });
        document.addEventListener('pointerdown', start, { capture: true });
        document.addEventListener('touchstart', start, { capture: true });
        document.addEventListener('keydown', start, { capture: true });
      }
      function removeAll() {
        document.removeEventListener('click', start, true);
        document.removeEventListener('pointerdown', start, true);
        document.removeEventListener('touchstart', start, true);
        document.removeEventListener('keydown', start, true);
      }

      // Prepare seeking when metadata loads
      bg.addEventListener('loadedmetadata', () => { seekToStart(); }, { once: true });
      addAll();
    })();

    // Card parallax tilt (disabled while interacting with button zone)

    noBtn.addEventListener("click", e => e.preventDefault());

    noBtn.addEventListener("pointerdown", e => {
      e.preventDefault();
      noClickCount++; // Increment click count
      
      // Check if we've reached the last message
      if (noClickCount >= noTexts.length) {
        // Break the button apart!
        breakButtonApart();
        return;
      }
      
      updateNoButtonText(); // Update text only on click
      noBtn.classList.add('flip');
      setTimeout(() => noBtn.classList.remove('flip'), 450);
      moveNo(e.clientX, e.clientY);
    });

    // Card parallax tilt (disabled while interacting with button zone)
    (function() {
      const card = document.querySelector('main.card');
      if (!card) return;
      let rect;
      let rafId = null;
      let targetRX = 0, targetRY = 0;
      let currentRX = 0, currentRY = 0;
      let tiltEnabled = true;

      function updateTilt(mx, my) {
        rect = rect || card.getBoundingClientRect();
        const x = mx - rect.left;
        const y = my - rect.top;
        const px = (x / rect.width - 0.5) * 2; // -1..1
        const py = (y / rect.height - 0.5) * 2; // -1..1
        const maxTilt = 8;
        targetRY = px * maxTilt; // rotateY
        targetRX = -py * maxTilt; // rotateX
        if (!rafId) animateTilt();
      }

      function animateTilt() {
        rafId = requestAnimationFrame(() => {
          currentRX += (targetRX - currentRX) * 0.18;
          currentRY += (targetRY - currentRY) * 0.18;
          card.classList.add('tilted');
          card.style.transform = `rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;
          card.style.boxShadow = `${-currentRY * 1.5}px ${currentRX * 1.5}px 40px rgba(255, 31, 104, 0.15)`;
          if (Math.abs(targetRX - currentRX) > 0.01 || Math.abs(targetRY - currentRY) > 0.01) {
            animateTilt();
          } else {
            rafId = null;
          }
        });
      }

      card.addEventListener('pointermove', (e) => {
        if (!tiltEnabled) return;
        rect = card.getBoundingClientRect();
        updateTilt(e.clientX, e.clientY);
      });
      card.addEventListener('pointerleave', () => {
        targetRX = 0; targetRY = 0; if (!rafId) animateTilt();
      });

      // Disable tilt when interacting in the button zone for stable positioning
      const zoneEl = document.getElementById('zone');
      if (zoneEl) {
        zoneEl.addEventListener('pointerenter', () => {
          tiltEnabled = false;
          card.style.transform = '';
          card.style.boxShadow = '';
        });
        zoneEl.addEventListener('pointerleave', () => {
          tiltEnabled = true;
        });
      }
    })();

    // Pointer ripple effect
    document.addEventListener('pointerdown', (e) => {
      const r = document.createElement('div');
      r.className = 'pointer-ripple';
      r.style.left = (e.clientX - 7) + 'px';
      r.style.top = (e.clientY - 7) + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 700);
    });

    // Celebration heart burst
    function celebrationBurst() {
      const layer = document.createElement('div');
      layer.className = 'celebration-burst';
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const icons = ['💖','💕','💗','💝'];
      for (let i = 0; i < 24; i++) {
        const h = document.createElement('div');
        h.className = 'burst-heart';
        h.textContent = icons[i % icons.length];
        const angle = (Math.PI * 2) * (i / 24);
        const dist = 120 + Math.random() * 180;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        h.style.setProperty('--tx', tx + 'px');
        h.style.setProperty('--ty', ty + 'px');
        h.style.left = (centerX - 12) + 'px';
        h.style.top = (centerY - 12) + 'px';
        h.style.animationDelay = (Math.random() * 0.3) + 's';
        layer.appendChild(h);
      }
      document.body.appendChild(layer);
      setTimeout(() => layer.remove(), 1800);
    }
